# Backend Secrets - REPLACE base64 values before applying!
# Generate base64: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: backend
type: Opaque
data:
  # echo -n "mongodb+srv://user:pass@cluster.mongodb.net/dbname" | base64
  MONGO_URI: REPLACE_WITH_BASE64_ENCODED_MONGO_URI
  # echo -n "your_jwt_secret" | base64
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_JWT_SECRET
  # echo -n "cloudinary://key:secret@cloud" | base64
  CLOUDINARY_URL: REPLACE_WITH_BASE64_ENCODED_CLOUDINARY_URL
